<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOCAB MASTER PRO</title>
    
    <style>
        :root {
            --primary: #4F46E5; 
            --bg: #F8FAFC;
            --card-dark: #1E293B;
            --accent: #10B981;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0; padding: 0; background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
            height: 100vh; height: 100dvh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: opacity 0.4s ease-out, visibility 0.4s;
        }
        #intro-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; background: var(--bg); }
        .page.active { display: flex; }

        .header {
            padding: 12px 20px; background: white; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #e2e8f0; font-weight: 800;
        }

        .lobby-content { 
            flex: 1; overflow-y: auto; padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; 
            touch-action: pan-y; display: flex; flex-direction: column;
        }
        
        .upload-box {
            background: white; border: 2px dashed #CBD5E1; border-radius: 16px;
            padding: 20px; text-align: center; margin-bottom: 20px;
        }
        .upload-btn {
            background: #64748b; color: white; border: none;
            padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 0.85rem;
            cursor: pointer; margin-top: 10px;
        }

        /* 설정 카드 스타일 */
        .settings-card {
            background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        .setting-item { margin-bottom: 15px; }
        .setting-label { display: block; font-size: 0.9rem; font-weight: 700; color: #475569; margin-bottom: 8px; }
        .setting-control { display: flex; gap: 8px; }
        
        .chip {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0;
            text-align: center; font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; background: white; color: #64748b;
        }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .tool-btn-group { display: flex; flex-direction: column; gap: 12px; }
        .tool-btn {
            background: white; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 16px; font-weight: 800; font-size: 1.05rem; color: #334155;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .tool-btn.main-play { background: var(--accent); color: white; border-color: var(--accent); }
        .tool-btn.resume-play { background: var(--primary); color: white; border-color: var(--primary); }

        /* 게임 화면 관련 */
        .game-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; perspective: 1200px; padding-bottom: 80px; position: relative; overflow: hidden; }
        #bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; transition: opacity 0.15s; }
        #bg-icon { font-size: 15rem; font-weight: 900; opacity: 0.35; color: white; transform: scale(0.5); }

        .progress-bar-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #e2e8f0; z-index: 10; }
        .progress-bar-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }

        .card-wrapper { width: 85%; max-width: 360px; height: 50vh; max-height: 450px; transform-style: preserve-3d; z-index: 5; }
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-front { background: white; color: #1E293B; }
        .card-back { background: var(--card-dark); color: white; transform: rotateY(180deg); }
        
        .word { font-size: 2.2rem; font-weight: 800; word-break: keep-all; }
        .meaning { font-size: 1.8rem; font-weight: 700; word-break: keep-all; }
        
        .nav-bar { position: absolute; bottom: 30px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; padding: 0 30px; }
        .nav-btn { background: white; border: 2px solid #e2e8f0; color: #64748b; padding: 12px 20px; border-radius: 30px; font-weight: 800; display: flex; align-items: center; gap: 6px; }

        /* 모달 공통 */
        .overlay-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .overlay-modal.visible { display: flex; }
        .modal-card { background: white; width: 85%; max-width: 380px; border-radius: 24px; padding: 30px; text-align: center; }
        .modal-action-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 1rem; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .modal-action-btn.primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div style="font-size: 4rem; margin-bottom: 10px;">📚</div>
        <div style="font-size: 2.2rem; font-weight: 900;">VOCAB MASTER</div>
    </div>

    <!-- 로비 -->
    <div id="lobby-page" class="page active">
        <div class="header">
            <span style="color:var(--primary)">VOCAB MASTER</span>
            <span id="word-count-badge" style="font-size: 0.8rem; background: #f1f5f9; padding: 4px 10px; border-radius: 10px;">0개 로드됨</span>
        </div>
        <div class="lobby-content">
            
            <div class="upload-box">
                <h3 style="margin:0 0 5px; font-size: 1rem;">백업 데이터 업로드</h3>
                <input type="file" id="file-input" accept=".json" style="display: none;" onchange="handleFileUpload(event)">
                <button class="upload-btn" onclick="document.getElementById('file-input').click()">파일 선택 (.json)</button>
            </div>

            <!-- 학습 설정 -->
            <div class="settings-card">
                <div class="setting-item">
                    <span class="setting-label">학습 방향</span>
                    <div class="setting-control">
                        <div class="chip active" id="mode-en" onclick="setMode('en')">A → 가<br><small>영어 먼저</small></div>
                        <div class="chip" id="mode-ko" onclick="setMode('ko')">가 → A<br><small>뜻 먼저</small></div>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">학습 단어 수</span>
                    <div class="setting-control">
                        <div class="chip" id="count-10" onclick="setCount(10)">10개</div>
                        <div class="chip" id="count-30" onclick="setCount(30)">30개</div>
                        <div class="chip active" id="count-all" onclick="setCount(0)">전체</div>
                    </div>
                </div>
            </div>

            <div class="tool-btn-group">
                <button class="tool-btn resume-play" id="btn-resume" onclick="resumeSession()" style="display:none;">
                    ◀ 하던 학습 이어하기
                </button>
                <button class="tool-btn main-play" onclick="startNewSession()" id="btn-start" style="display:none;">
                    🚀 새 학습 시작하기
                </button>
            </div>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-page" class="page">
        <div class="header">
            <button onclick="openPauseModal()" style="background:none; border:none; font-size:1.4rem; color:#64748B;">⏸</button>
            <div id="stage-info" style="font-size:1rem; font-weight:800;">Learning</div>
            <span id="queue-count" style="color:var(--primary); font-weight: bold;">0 남음</span>
        </div>
        
        <div class="game-container" id="touchArea">
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
            <div id="bg-overlay"><div id="bg-icon"></div></div>
            
            <div class="card-wrapper" id="cardWrapper">
                <div class="card-inner" id="cardInner">
                    <div class="card-face card-front">
                        <div class="word" id="card-q">Question</div>
                        <div style="margin-top:20px; color:#94A3B8; font-size:0.8rem;">터치하여 확인</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="meaning" id="card-a">Answer</div>
                    </div>
                </div>
            </div>
            
            <div class="nav-bar">
                <button class="nav-btn" onclick="markNo()" style="color:#EF5350;">✕ 몰라요</button>
                <button class="nav-btn" onclick="markOk()" style="color:#8BC34A;">○ 외웠어요</button>
            </div>
        </div>
    </div>

    <!-- 완료 모달 -->
    <div id="complete-modal" class="overlay-modal">
        <div class="modal-card">
            <div style="font-size:3rem">🎉</div>
            <h2>학습 완료!</h2>
            <p>선택한 모든 단어를 학습했습니다.</p>
            <button class="modal-action-btn primary" onclick="goBack()">메인으로</button>
        </div>
    </div>

    <!-- 일시정지 모달 -->
    <div id="pause-modal" class="overlay-modal">
        <div class="modal-card">
            <h2>일시정지</h2>
            <p>진행 상황이 자동으로 저장되었습니다.</p>
            <button class="modal-action-btn primary" onclick="closePauseModal()">계속하기</button>
            <button class="modal-action-btn" style="background:#f1f5f9" onclick="goBack()">메인으로</button>
        </div>
    </div>

    <script>
        // 전역 상태
        let vocabData = [];     // 전체 단어장
        let activeQueue = [];   // 현재 학습 중인 큐
        let totalCount = 0;     // 이번 세션의 총 단어 수
        let isFlipped = false;
        
        // 설정값
        let studyMode = 'en';   // 'en' (영어먼저), 'ko' (한글먼저)
        let studyCount = 0;     // 0이면 전체

        const storageKey = 'savedVocabData';
        const sessionKey = 'currentSession';

        window.onload = () => {
            const saved = localStorage.getItem(storageKey);
            if (saved) {
                vocabData = JSON.parse(saved);
                updateLobbyUI();
            }

            const session = localStorage.getItem(sessionKey);
            if (session) {
                document.getElementById('btn-resume').style.display = 'flex';
            }

            setTimeout(() => document.getElementById('intro-screen').classList.add('hidden'), 1000);
        };

        // --- 설정 관련 ---
        function setMode(mode) {
            studyMode = mode;
            document.getElementById('mode-en').classList.toggle('active', mode === 'en');
            document.getElementById('mode-ko').classList.toggle('active', mode === 'ko');
        }

        function setCount(count) {
            studyCount = count;
            document.getElementById('count-10').classList.toggle('active', count === 10);
            document.getElementById('count-30').classList.toggle('active', count === 30);
            document.getElementById('count-all').classList.toggle('active', count === 0);
        }

        // --- 파일 처리 ---
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    let target = data.vocab || data;
                    vocabData = Object.keys(target).map(k => ({
                        word: typeof target[k] === 'object' ? (target[k].displayWord || k) : k,
                        mean: typeof target[k] === 'object' ? target[k].mean : target[k]
                    }));
                    localStorage.setItem(storageKey, JSON.stringify(vocabData));
                    updateLobbyUI();
                    alert("성공적으로 불러왔습니다!");
                } catch (e) { alert("파일 형식이 잘못되었습니다."); }
            };
            reader.readAsText(file);
        }

        function updateLobbyUI() {
            document.getElementById('word-count-badge').innerText = vocabData.length + "개 로드됨";
            if (vocabData.length > 0) document.getElementById('btn-start').style.display = 'flex';
        }

        // --- 세션 관리 ---
        function startNewSession() {
            // 섞기
            let temp = [...vocabData].sort(() => Math.random() - 0.5);
            // 개수 자르기
            let count = studyCount === 0 ? temp.length : Math.min(studyCount, temp.length);
            activeQueue = temp.slice(0, count);
            totalCount = activeQueue.length;
            
            initGame();
        }

        function resumeSession() {
            const session = JSON.parse(localStorage.getItem(sessionKey));
            activeQueue = session.queue;
            totalCount = session.total;
            studyMode = session.mode;
            initGame();
        }

        function saveSession() {
            localStorage.setItem(sessionKey, JSON.stringify({
                queue: activeQueue,
                total: totalCount,
                mode: studyMode
            }));
        }

        function initGame() {
            updateCard();
            updateProgress();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('game-page').classList.add('active');
        }

        function updateCard() {
            if (activeQueue.length === 0) {
                localStorage.removeItem(sessionKey);
                document.getElementById('complete-modal').classList.add('visible');
                return;
            }
            
            const card = activeQueue[0];
            const qEle = document.getElementById('card-q');
            const aEle = document.getElementById('card-a');
            
            if (studyMode === 'en') {
                qEle.innerText = card.word;
                aEle.innerText = card.mean;
            } else {
                qEle.innerText = card.mean;
                aEle.innerText = card.word;
            }
            
            resetCardUI();
            saveSession();
        }

        function updateProgress() {
            const remaining = activeQueue.length;
            const pct = ((totalCount - remaining) / totalCount) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('queue-count').innerText = `${remaining} 남음`;
        }

        // --- 카드 액션 ---
        function markOk() {
            animateCard('ok', () => {
                activeQueue.shift();
                updateProgress();
                updateCard();
            });
        }

        function markNo() {
            animateCard('no', () => {
                const card = activeQueue.shift();
                activeQueue.push(card); // 끝으로 보내기
                updateCard();
            });
        }

        function animateCard(type, callback) {
            const cw = document.getElementById('cardWrapper');
            const destX = type === 'ok' ? window.innerWidth + 200 : -window.innerWidth - 200;
            cw.style.transition = 'transform 0.3s ease-out';
            cw.style.transform = `translateX(${destX}px) rotate(${type==='ok'?30:-30}deg)`;
            setTimeout(callback, 250);
        }

        function resetCardUI() {
            isFlipped = false;
            const ci = document.getElementById('cardInner');
            const cw = document.getElementById('cardWrapper');
            ci.style.transition = 'none';
            ci.classList.remove('flipped');
            cw.style.transition = 'none';
            cw.style.transform = 'translateX(0) rotate(0)';
            void cw.offsetWidth;
        }

        // --- 터치 로직 (플립) ---
        const cw = document.getElementById('cardWrapper');
        cw.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        cw.addEventListener('touchend', e => {
            let diff = Math.abs(e.changedTouches[0].clientX - startX);
            if (diff < 10) { // 단순 터치면 뒤집기
                isFlipped = !isFlipped;
                document.getElementById('cardInner').style.transition = 'transform 0.5s';
                document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
            }
        });

        // --- 모달 제어 ---
        function openPauseModal() { document.getElementById('pause-modal').classList.add('visible'); }
        function closePauseModal() { document.getElementById('pause-modal').classList.remove('visible'); }
        function goBack() { 
            document.querySelectorAll('.overlay-modal').forEach(m => m.classList.remove('visible'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('lobby-page').classList.add('active');
            
            // 이어하기 버튼 갱신
            if(localStorage.getItem(sessionKey)) {
                document.getElementById('btn-resume').style.display = 'flex';
            } else {
                document.getElementById('btn-resume').style.display = 'none';
            }
        }
    </script>
</body>
</html>
